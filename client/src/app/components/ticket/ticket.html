<div class="ticket-page">
  <h1 class="ticket-page-heading">My Tickets</h1>

  @if (allTickets | async; as tickets) {
    @if (tickets.length === 0) {
      <p class="ticket-empty">No tickets assigned.</p>
    } @else {
      <div class="ticket-list">
        @for (ticket of tickets; track ticket.ticketId) {
          <div class="ticket-card" (click)="openThread(ticket)">
            <h2 class="ticket-card-subject">{{ ticket.subject }}</h2>
            <div class="ticket-card-meta">
              <span class="ticket-status" [class]="'ticket-status--' + ticket.status.toLowerCase()">
                {{ ticket.status }}
              </span>
              <span class="ticket-date">{{ ticket.createdAt }}</span>
            </div>
            <span class="ticket-body">
                {{ ticket.body }}
            </span>
          </div>
        }
      </div>
    }
  }
</div>
